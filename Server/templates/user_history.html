<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node {{ uid }} History | System</title>
    <style>
        :root {
            --bg: #111111;
            --card-bg: #1a1a1a;
            --border: #333333;
            --text: #eeeeee;
            --text-muted: #888888;
            --accent: #2563eb;
            --header-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 2px;
        }

        .back-link:hover {
            color: #fff;
            border-color: #555;
        }

        .container {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .history-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .large-preview {
            background-color: #000;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }

        .large-preview img {
            width: 100%;
            display: block;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .log-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--border);
            padding: 15px;
            border-radius: 2px;
        }

        .log-item.latest {
            border-left-color: var(--accent);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-family: monospace;
        }

        .log-answer {
            font-weight: 700;
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .log-reasoning {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        @media (max-width: 900px) {
            .history-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <a href="/dashboard" class="back-link">CONSOLE</a>
        <h1>NODE {{ uid }} HISTORY</h1>
    </header>
    <div class="container">
        <div class="history-layout">
            <div class="main-content">
                {% if last_img %}
                <div class="large-preview">
                    <img src="/screenshots/{{ last_img }}" alt="Latest View">
                </div>
                {% endif %}
            </div>
            <div class="timeline">
                {% for entry in history|reverse %}
                <div class="log-item {{ 'latest' if loop.first else '' }}">
                    <div class="log-header">
                        <span>{{ entry.time }}</span>
                        <span>ID: {{ loop.index0 }}</span>
                    </div>
                    <div class="log-answer">RESULT: {{ entry.answer if entry.answer > 0 else "N/A" }}</div>
                    <div class="log-reasoning">{{ entry.reasoning }}</div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>

</html>
