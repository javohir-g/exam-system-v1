<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node {{ uid }} History</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(15, 15, 18, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --text-main: #fcfcfc;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 30px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .history-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .main-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .screenshot-large {
            width: 100%;
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .screenshot-large img {
            width: 100%;
            display: block;
        }

        .timeline {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px;
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
        }

        .event-card {
            border-left: 2px solid var(--border);
            padding-left: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
        }

        .event-card.active::before {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .event-time {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 5px;
            font-family: monospace;
        }

        .event-answer {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .event-reasoning {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 5px;
            line-height: 1.4;
        }

        @media (max-width: 900px) {
            .history-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="/dashboard" class="back-btn">← BACK TO CONSOLE</a>
            <h1>NODE {{ uid }} LOGS</h1>
        </header>

        <div class="history-grid">
            <div class="main-view">
                {% if last_img %}
                <div class="screenshot-large">
                    <img src="/screenshots/{{ last_img }}" alt="Latest View">
                </div>
                {% endif %}
            </div>

            <div class="timeline">
                <h2 style="font-size: 1rem; margin-top: 0; margin-bottom: 20px; opacity: 0.5;">TRANSMISSION HISTORY</h2>
                {% for entry in history|reverse %}
                <div class="event-card {{ 'active' if loop.first else '' }}">
                    <div class="event-time">{{ entry.time }}</div>
                    <div class="event-answer">KEY: {{ entry.answer if entry.answer > 0 else "N/A" }}</div>
                    <div class="event-reasoning">{{ entry.reasoning }}</div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>

</html>
