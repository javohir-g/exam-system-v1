<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE {{ user_id }} HISTORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f11;
            --border: #1e1e22;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 700;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .log-entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: grid;
            grid-template-columns: 240px 1fr;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .log-entry:hover {
            border-color: #333;
        }

        .img-wrap {
            cursor: pointer;
            border-right: 1px solid var(--border);
            background: #000;
            position: relative;
        }

        .log-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .img-wrap:hover .log-img {
            opacity: 1;
        }

        .log-details {
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .ts {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .result-box {
            margin-bottom: 20px;
        }

        .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .ans {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .reason {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-top: auto;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 8px;
            border-left: 2px solid var(--accent);
        }

        /* Lightbox Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
            backdrop-filter: blur(8px);
        }

        #overlay img {
            max-width: 95%;
            max-height: 95%;
            border: 1px solid #333;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            .log-entry {
                grid-template-columns: 1fr;
            }

            .img-wrap {
                border-right: none;
                border-bottom: 1px solid var(--border);
                aspect-ratio: 16/9;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="/dashboard" class="back-btn">&larr; CONSOLE</a>
            <h1>NODE {{ user_id }} ANALYSIS</h1>
        </header>

        <div class="timeline">
            {% for event in data.history | reverse %}
            <div class="log-entry">
                <div class="img-wrap" onclick="openOverlay(this.querySelector('img').src)">
                    <img src="/screenshots/{{ event.filename }}" class="log-img">
                </div>
                <div class="log-details">
                    <div class="ts">{{ event.timestamp }}</div>
                    <div class="result-box">
                        <div class="label">Detected Answer</div>
                        <div class="ans">{{ "ABCD"[event.answer-1] if event.answer > 0 else "?" }}</div>
                    </div>
                    <div class="reason">{{ event.reasoning }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <img id="overlay-img" src="">
    </div>

    <script>
        function openOverlay(src) {
            document.getElementById('overlay-img').src = src;
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>

</html>
